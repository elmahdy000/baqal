<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>مفيش نت — بقالك</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #F8FAFC;
        color: #111827;
        font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .box { padding: 32px; max-width: 400px; }
      h1 { color: #16A34A; margin-bottom: 8px; }
      p { color: #6b7280; line-height: 1.6; }
      button {
        margin-top: 16px;
        background: #16A34A;
        color: white;
        border: 0;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 600;
        font-family: inherit;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div style="font-size:64px">📡</div>
      <h1>مفيش نت دلوقتي</h1>
      <p>لازم تكون متصل بالإنترنت علشان تطلب من البقال. راجع الاتصال وحاول تاني.</p>
      <button onclick="location.reload()">حاول تاني</button>
    </div>
  </body>
</html>
